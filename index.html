<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ジグソーパズルゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <input type="file" id="imageInput" accept="image/*">
            <select id="difficulty">
                <option value="12">簡単</option>
                <option value="24" selected>普通</option>
                <option value="48">難しい</option>
                <option value="80">とても難しい</option>
                <option value="300">エキスパート</option>
            </select>
            <span id="pieceInfo" class="info-badge">-</span>
            <button id="startBtn" disabled>開始</button>
            <button id="shuffleBtn" disabled>シャッフル</button>
            <button id="hintBtn" disabled>ヒント</button>
            <span class="info-badge"><span id="timer">00:00</span></span>
            <span class="info-badge"><span id="connectedCount">0</span>/<span id="totalConnections">0</span></span>
            <a href="jigsawplanetClone/index.html" class="nav-link-btn">高機能版</a>
        </div>

        <div class="game-area">
            <div class="puzzle-section">
                <canvas id="puzzleCanvas"></canvas>
            </div>
        </div>

        <div id="completeModal" class="modal">
            <div class="modal-content">
                <h2>おめでとうございます！</h2>
                <div id="completeImageContainer">
                    <img id="completeImage" src="" alt="完成画像">
                </div>
                <p>クリア時間: <span id="clearTime"></span></p>
                <button id="playAgainBtn">もう一度プレイ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
